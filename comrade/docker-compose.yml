services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comrade
      POSTGRES_PASSWORD: comrade
      POSTGRES_DB: comrade
    ports:
      - "5432:5432"
    volumes:
      - comrade_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comrade -d comrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://comrade:comrade@postgres:5432/comrade
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  comrade_pg:
